<!DOCTYPE html>
<html>
<head>
    <title>3D Orbit Slider</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* depth */
        }

        .carousel {
            width: 300px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s;
        }

        .carousel img {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
            left: 0;
            top: 0;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            background: #00adb5;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>3D Orbit Image Slider</h1>

<div class="container">
    <div class="carousel" id="carousel">
        <img src="https://picsum.photos/300/200?1">
        <img src="https://picsum.photos/300/200?2">
        <img src="https://picsum.photos/300/200?3">
        <img src="https://picsum.photos/300/200?4">
    </div>
</div>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>

<script>
    const carousel = document.getElementById("carousel");
    const images = carousel.children;
    const total = images.length;

    let angle = 0;
    const step = 360 / total;

    // Arrange images in circular orbit
    for (let i = 0; i < total; i++) {
        images[i].style.transform =
            "rotateY(" + (i * step) + "deg) translateZ(400px)";
    }

    function next() {
        angle -= step;
        carousel.style.transform = "rotateY(" + angle + "deg)";
    }

    function prev() {
        angle += step;
        carousel.style.transform = "rotateY(" + angle + "deg)";
    }
</script>

</body>
</html>

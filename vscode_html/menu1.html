<html>
    <head>
        <style>
            /*Reset*/

            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Segoe UI', sans-serif;
                background-color: #f4f4f4;
            }
            /*Navbar Container*/

            .navbar {
                background-color: #333;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 50px;
                height: 60px;
            }

            .logo {
                color: white;
                font-size: 1.5rem;
                font-weight: bold;
                text-decoration: none;
            }
            /*Menu Styling*/
            
            .nav-links {
                list-style: none;
                display: flex;
            }

            .nav-links li a {
                color: white;
                text-decoration: none;
                padding: 20px 15px;
                display: block;
                transition: background 0.3s;
            }

            /*Hover Effect */

            .nav-links li a:hover {
                background-color: #04AA6D;
                color: white;
            }

            /*Active State */
            .active {
                background-color: #04AA6D;
            }

            /*Mobile Responsive (Stack vertically) */

            @media (max-width:600px) {
                .navbar {
                    flex-direction: column;
                    height: auto;
                    padding: 10px;
                }
                .nav-links {
                    flex-direction: column;
                    width: 100%;
                    text-align: center;
                }
            }
        </style>
    </head>
     <body>

        <nav class="navbar">
            <a href="#" class="log">MyBrand</a>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <div style="padding: 20px;">
            <h1>Welcome to the Page</h1>
            <p>This menu is built using standard <code>&lt;ul&gt;</code> and <code>&lt;li&gt;</code> tags.</p>
        </div>
     </body>
</html>

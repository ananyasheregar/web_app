<!DOCTYPE html>
<html lang = "en">

<head>
    <meta charset="UTF-8">
    <title>Real-Time Chat</title>
    <style>
        body {
            font-family: -apple-system, sana-serif;
            background: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #chat-container {
            width:100%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        #messages {
            list-style: none;
            padding: 0;
            margin:0 0 20px 0;
            height: 300px;
            overflow-y: auto;
            border-bottom: 1px solid #eee;
        }

        #messages li {
            padding: 10px;
            margin-bottom: 8px;
            background: #e9ecef;
            border-radius: 8px;
            word-wrap:break-word;
        }

        #form {
            display: flex;
        }

        #input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px 0 0 5px;
            outline: none;
        }

        button {
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background:#0056b3;
        }

        
    </style>
</head>

<body>
    <div id="chat-container">
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Type a message..."/><button>Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket=io();
        const form=document.getElementById('form');
        const input=document.getElementById('input');
        const messages = document.getElementById('messages');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emot('chat message', input.value);
                input.value='';
            }
        });

        //Receive a message from a server
        socket.on('chat message', (msg) => {
            const item = document.createElement('li');
            item.textContent=msg;
            messages.appendChild(item);
            messages.scrollTop=messsages.scrollHeight;
        });
    </script>
</body>

</html>
